version: 2.15.11
project:
  name: MontGoWork
  description: "MontGoWork helps Montgomery residents overcome the real barriers between\
    \ them and\n  employment. It's not just a job board — it's a navigator that identifies\
    \ what's\n  actually blocking someone from working (transportation, childcare,\
    \ credit history,\n   skills gaps) and builds a personalized action plan to address\
    \ each barrier."
  primary_goal: Give a Montgomery resident a clear, actionable path from "I can't   get
    a job" to employment by connecting barrier assessment, credit building tools,   local
    job matching, and community resources into
  coverage_target: 100
workflow:
  default_branch_type: feature
  main_branch: main
  context_dir: .paircoder/context
  plans_dir: .paircoder/plans
  tasks_dir: .paircoder/tasks
  repo_url: https://github.com/fivedollarfridays/montgowork
pack:
  default_name: agent_pack.tgz
  excludes:
  - .git
  - .venv
  - __pycache__
  - node_modules
  - dist
  - build
  - '*.log'
  - '*.bak'
  - '*.egg-info'
  - .pytest_cache
  - .mypy_cache
  - .ruff_cache
  - htmlcov
  - .coverage
models:
  navigator: claude-opus-4-6
  driver: claude-opus-4-6
  reviewer: claude-haiku-4-5
  providers:
    anthropic:
      models:
      - claude-opus-4-6
      - claude-sonnet-4-6
      - claude-sonnet-4-5
      - claude-haiku-4-5
      default_effort: medium
  preset: quality
routing:
  by_complexity:
    trivial:
      max_score: 20
      model: claude-haiku-4-5
    simple:
      max_score: 40
      model: claude-sonnet-4-6
    moderate:
      max_score: 60
      model: claude-sonnet-4-6
    complex:
      max_score: 80
      model: claude-opus-4-6
    epic:
      max_score: 100
      model: claude-opus-4-6
  overrides:
    security: claude-opus-4-6
    architecture: claude-opus-4-6
trello:
  enabled: true
  board_id: 69a8cf211beef1be546c86c1
  board_name: MontGoWork
  defaults:
    project: MontGoWork
    stack: 'Frontend: Next.js 15 + shadcn/ui + Tailwind Backend: FastAPI (Python 3.11+)
      Database: SQLite AI: Claude API (Sonnet) Credit: Shawn''s Credit Assessment
      API (735 tests, FCRA-compliant, /v1/assess via X-API-Key) Scraping: Bright Data
      Crawl API PDF Export: html2pdf.js Email Export: EmailJS free tier Scaffold:
      DualStack kit Workflow: PairCoder + git worktrees + GitHub Actions CI Hosting:
      Vercel (frontend) + Railway/Render (backend) — free tiers'
    repo_url: https://github.com/fivedollarfridays/montgowork
  board_structure:
    lists:
    - name: Intake/Backlog
      maps_to_status:
      - pending
      - backlog
    - name: Planned/Ready
      maps_to_status:
      - ready
      - planned
    - name: In Progress
      maps_to_status:
      - in_progress
    - name: Review/Testing
      maps_to_status:
      - review
      - testing
    - name: Deployed/Done
      maps_to_status:
      - done
      - deployed
    - name: Issues/Tech Debt
      maps_to_status:
      - blocked
      - issue
  custom_fields:
    project:
      type: dropdown
      options:
      - --
      - MontGoWork
      default: MontGoWork
    stack:
      type: dropdown
      options:
      - --
      - React
      - Flask
      - Worker/Function
      - Infra
      - Collection
      mapping:
        cli: Worker/Function
        python: Flask
        backend: Flask
        frontend: React
        ui: React
        worker: Worker/Function
        function: Worker/Function
        infra: Infra
        deploy: Infra
        ci: Infra
        docs: Collection
        documentation: Collection
      default: Worker/Function
    status:
      type: dropdown
      options:
      - --
      - Planning
      - In progress
      - Testing
      - Done
      - Enqueued
      - Waiting
      - Blocked
      mapping:
        pending: Planning
        ready: Enqueued
        in_progress: In progress
        review: Testing
        testing: Testing
        done: Done
        blocked: Blocked
        waiting: Waiting
      default: Planning
    effort:
      type: dropdown
      options:
      - --
      - S
      - M
      - L
      mapping:
        0-30: S
        31-60: M
        61-100: L
      default: M
    agent_task:
      type: checkbox
      default: false
  labels:
  - name: Frontend
    color: green
    matches:
    - react
    - ui
    - frontend
    - css
  - name: Backend
    color: blue
    matches:
    - flask
    - api
    - backend
    - python
  - name: Worker / Function
    color: purple
    matches:
    - worker
    - function
    - background
    - async
    - cli
  - name: Deployment
    color: red
    matches:
    - deploy
    - ci
    - cd
    - infra
    - config
  - name: Bug / Issue
    color: orange
    matches:
    - bug
    - fix
    - issue
    - error
  - name: Documentation
    color: sky
    matches:
    - docs
    - documentation
    - readme
    - guide
  automation:
    on_task_ready:
      move_to_list: Planned/Ready
      set_status: Enqueued
    on_task_start:
      move_to_list: In Progress
      set_status: In progress
    on_task_review:
      move_to_list: Review/Testing
      set_status: Testing
    on_task_complete:
      move_to_list: Deployed/Done
      set_status: Done
    on_task_block:
      move_to_list: Issues/Tech Debt
      set_status: Blocked
  mode: native
estimation:
  complexity_to_hours:
    xs:
      range:
      - 0
      - 15
      hours:
      - 0.5
      - 1.0
      - 2.0
    s:
      range:
      - 16
      - 30
      hours:
      - 1.0
      - 2.0
      - 4.0
    m:
      range:
      - 31
      - 50
      hours:
      - 2.0
      - 4.0
      - 8.0
    l:
      range:
      - 51
      - 75
      hours:
      - 4.0
      - 8.0
      - 16.0
    xl:
      range:
      - 76
      - 100
      hours:
      - 8.0
      - 16.0
      - 32.0
token_estimates:
  base_context: 15000
  per_complexity_point: 500
  per_file_touched: 2000
  by_task_type:
    feature: 1.2
    bugfix: 0.8
    docs: 0.6
    refactor: 1.5
    chore: 0.9
token_budget:
  warning_threshold: 60
  critical_threshold: 80
  enforcement_mode: hard
metrics:
  enabled: true
  store_path: .paircoder/history/metrics.jsonl
hooks:
  enabled: true
  on_task_ready:
  - sync_trello
  - update_state
  on_task_start:
  - select_model
  - check_token_budget
  - start_timer
  - sync_trello
  - update_state
  on_task_review:
  - sync_trello
  - update_state
  on_task_complete:
  - arch_check_modified
  - contract_break_check
  - stop_timer
  - record_token_usage
  - apply_token_learning
  - workspace_impact_scan
  - telemetry_snapshot
  - calibration_update_incremental
  - feedback_calibrate
  - sync_trello
  - update_state
  - check_unblocked
  on_task_block:
  - sync_trello
  - update_state
containment:
  enabled: false
  mode: strict
  auto_checkpoint: true
  rollback_on_violation: true
  blocked_directories: []
  blocked_files:
  - .env
  - .env.local
  - .env.production
  - credentials.json
  - secrets.yaml
  readonly_directories:
  - .claude/agents
  - .claude/commands
  - .claude/skills
  readonly_files:
  - CLAUDE.md
  - AGENTS.md
  allow_network:
  - api.anthropic.com
  - api.trello.com
  - github.com
  - pypi.org
  blocked_paths:
  - .env
  - .env.local
  - .env.production
  - credentials.json
  - secrets.yaml
enforcement:
  state_machine: true
  strict_ac_verification: true
  require_budget_check: true
  preset: strict
  bypass_audit: true
  protected_paths:
  - .claude/skills/
  - .paircoder/config.yaml
architecture:
  enabled: true
  max_file_lines: 300
  warning_file_lines: 150
  max_function_lines: 40
  max_functions_per_file: 12
  max_imports: 15
  exclude_patterns:
  - '**/migrations/*'
  - '**/__init__.py'
  - '**/conftest.py'
  - '**/test_fixtures.py'
  - '**/*_generated.py'
github:
  enabled: true
  auto_pr: true
telemetry:
  cost_tracking: true
  privacy_level: full
mcp:
  enabled: true
  port: 3000
toggl:
  enabled: false
